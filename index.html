<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>GrooveBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1c1c1c;--sf3:#242424;--bd:#2a2a2a;--tx:#e8e8e8;--dm:#888;--mt:#555;--ac:#c8ff00;--acd:rgba(200,255,0,.12);--rd:#ff4444;--gn:#22c55e;--bl:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#555;transition:all .3s}
.dot.on{background:var(--ac);box-shadow:0 0 8px var(--ac);animation:pulse 2s ease-in-out infinite}
.dot.done{background:var(--gn);box-shadow:0 0 8px var(--gn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:-.5px}
.hdr h1 em{color:var(--ac);font-style:normal}
.badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dm);background:var(--sf2);padding:4px 10px;border-radius:4px}
.main{padding:16px;max-width:480px;margin:0 auto;padding-bottom:120px}
.banner{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.banner .icon{font-size:32px;margin-bottom:8px}
.banner .title{font-size:14px;font-weight:500}
.banner .sub{font-size:12px;color:var(--dm);margin-top:4px}
.banner.ok{border-color:var(--gn)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-head{padding:16px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.rank{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ac);background:var(--acd);padding:2px 8px;border-radius:4px}
.score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dm)}
.card-body{padding:0 16px 16px}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.45;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--sf3);color:var(--dm)}
.tag.cat{background:var(--acd);color:var(--ac)}
.angle{font-size:13px;color:var(--dm);line-height:1.55}
.sel-btn{display:block;width:100%;padding:12px;background:var(--sf2);border:none;border-top:1px solid var(--bd);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.sel-btn:active{background:var(--ac);color:#000}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;min-height:48px;transition:all .15s}
.btn-p{background:var(--ac);color:#000}
.btn-p:active{transform:scale(.97);filter:brightness(.9)}
.btn-p:disabled{background:var(--sf3);color:var(--mt);cursor:not-allowed}
.btn-d{background:transparent;border:1px solid var(--rd);color:var(--rd)}
.btn-g{background:transparent;border:1px solid var(--bd);color:var(--dm)}
.btn-grp{display:flex;gap:8px}
.btn-grp .btn{flex:1}
.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:50;max-width:480px;margin:0 auto}
.loading{display:flex;flex-direction:column;align-items:center;padding:40px 0;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.load-text{font-size:13px;color:var(--dm);text-align:center;line-height:1.8;white-space:pre-line}
.err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--rd)}
.label{font-size:11px;font-weight:600;color:var(--mt);letter-spacing:1px;text-transform:uppercase;margin:20px 0 10px}
.inp{width:100%;padding:12px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;font-family:'JetBrains Mono',monospace;outline:none}
.inp:focus{border-color:var(--ac)}
.preview-wrap{background:#fff;border-radius:8px;overflow:hidden;margin:12px 0;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.preview-wrap img{max-width:100%!important;height:auto!important}
.preview-wrap table{width:100%;border-collapse:collapse;margin:16px 0}
.preview-wrap hr{border:none;border-top:1px solid #e5e5e5;margin:28px 0}
.preview-wrap p{margin-bottom:16px;color:#333}
.sc-badge{font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
.sc-hi{background:rgba(34,197,94,.15);color:var(--gn)}
.sc-md{background:rgba(59,130,246,.15);color:var(--bl)}
.hist-item{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.hist-item:last-child{border-bottom:none}
.hist-title{font-size:13px;font-weight:500;flex:1;margin-right:12px}
.hist-date{font-size:11px;color:var(--mt);font-family:'JetBrains Mono',monospace}
.howto{font-size:14px;color:var(--tx);line-height:1.8;padding:16px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="dot" id="dot"></div>
    <h1>Groove<em>Bot</em></h1>
  </div>
  <div class="badge" id="status-badge">IDLE</div>
</div>

<div class="main" id="app"></div>

<script>
// ─── CONFIG ───
const MODEL = "claude-sonnet-4-20250514";
const CATS = {"website-creation-tips":"홈페이지 제작 팁","seo-techniques":"SEO 테크닉","grooveweb-story":"그루브웹 이야기"};
const EXISTING = ["사이트 구조 설계","메타 태그","SEO 키워드리서치","SEO 최적화 검색 노출","자료 준비","제작 업체 선택","제작 기간","제작 비용 견적","제작 및 보수","의뢰 질문 10가지","사내디자이너 없이","디자인만 잘하는 업체","외주 전 7가지","기획 가능한 업체","기간 단축","SEO 실무자","포트폴리오 확인","아임웹 워드프레스 비교","디자인만 예쁘면","스타트업 홈페이지","반응형 제작사","리뉴얼 실패","실무자 기준","의뢰 전 단계","기획안 놓치는 것","모바일 무시","B2B 마케팅","고객 못 잡는 이유","부동산 홈페이지","화장품 제조업체","반응형 적응형","모바일 SEO","기업 홈페이지 필요","2025년 트렌드","SEO 의뢰 4가지","기획 꿀팁","SEO 계약 10개","홈페이지 블로그 비교","서드파티 쿠키","아임웹 장점","10년 아임웹","그로스해킹","기획안 고급","아임웹 워드프레스","효율적 SEO","비용 시간","SEO 중요성","중견기업 리뉴얼","백링크 품질","아임웹 구축","기획 핵심","평균 가격","9년 경험","테크니컬 SEO","방문자 머물지 않는","롱테일 숏테일","온페이지 SEO","최신 트렌드","놓치기 쉬운","체크리스트","중소기업 스타트업","브랜드 스토리","리뉴얼 신호","아임웹 9년차","고객 궁금","업체 질문","홈페이지 블로그 통계","비용 차이","노하우","피해야 할 업체","업체 선택","업체 기준","블랙햇 화이트햇","컨텐츠 SEO","검색엔진 등록","백링크 핵심","백링크 추천","구글 애널리틱스","웹 디자인 트렌드"];
const FOOTER = `<hr><p style="text-align:justify;letter-spacing:0px"><img src="https://cdn.imweb.me/upload/S20240529026030d67eeda/320e151158880.jpg" style="width:100%"></p><p style="text-align:justify;letter-spacing:0px"><strong style="font-size:16px">그루브웹은 10년 이상의 경험을 바탕으로, 고객 맞춤형 웹사이트를 설계하고 개발하는 전문 웹사이트 제작업체입니다.</strong> <span style="font-size:16px">디자이너 출신의 전문 팀이 직접 운영하며, 아임웹과 자체 코드를 활용한 효율적이고 직관적인 웹사이트 구축을 제공합니다.</span></p><p style="text-align:justify;letter-spacing:0px"><strong style="font-size:16px">수많은 성공적인 프로젝트를 통해 그루브웹은 고객의 고민을 100% 이해하고, 그 이상의 해결책을 제안하는 것을 목표로 하고 있습니다.</strong> <span style="font-size:16px">고객의 비즈니스 성장과 성공을 위해 항상 최선을 다하는 그루브웹은 각 분야에 맞는 맞춤형 솔루션을 제공합니다.</span></p><p style="text-align:justify;letter-spacing:0px"><span style="font-size:16px">웹사이트 제작에 대해 궁금한 점이 있으신가요? 아래 연락처로 문의해 주시면, 신속하게 상담을 진행해 드리겠습니다.</span></p><p style="text-align:center;letter-spacing:0px"><a href="https://www.groove-web.com/contact" target="_blank" style="font-size:16px;background-color:#000;color:#fff;padding:12px 32px;text-decoration:none;display:inline-block;margin:16px 0">가장 빠른 상담 요청하기 →</a></p><p style="text-align:justify;letter-spacing:0px"><img src="https://cdn.imweb.me/upload/S20240529026030d67eeda/6889c8458b2c3.jpg" style="width:100%"></p>`;

let state = { step:"setup", apiKey:"", candidates:[], selected:null, html:"", title:"", score:0, history:[], error:null, loading:false, loadMsg:"" };

// ─── Storage ───
function saveKey(k){ state.apiKey=k; try{localStorage.setItem("gb-key",k)}catch(e){} }
function loadKey(){ try{return localStorage.getItem("gb-key")||""}catch(e){return""} }
function saveHist(){ try{localStorage.setItem("gb-hist",JSON.stringify(state.history))}catch(e){} }
function loadHist(){ try{return JSON.parse(localStorage.getItem("gb-hist")||"[]")}catch(e){return[]} }

// ─── API ───
async function callClaude(sys, msg, search=false){
  const body = {model:MODEL, max_tokens:8192, system:sys, messages:[{role:"user",content:msg}]};
  if(search) body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const r = await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d = await r.json();
  if(!r.ok) throw new Error(d?.error?.message||`Error ${r.status}`);
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}

// ─── Research ───
async function doResearch(){
  state.loading=true; state.loadMsg="해외 SEO/UIUX 소스를 스캔하고 있습니다...\n10개 이상의 소스 분석 중 (1-2분)"; state.error=null; render();
  try{
    const sys=`You are a senior SEO/UIUX content researcher for 그루브웹.
Search the web for latest overseas SEO, UIUX, web development articles from the past 7-30 days.
Sources: Search Engine Journal, Moz, Ahrefs, Semrush, Google Search Central, Smashing Magazine, NNGroup, Web.dev, X SEO community, Reddit SEO.
Select 5 best candidates for a Korean column.
Selection: NOT overlap with: ${EXISTING.join(", ")}
Map to: "website-creation-tips"/"seo-techniques"/"grooveweb-story"
Relevant to Korean SMB owners. Enough for 2000+ words.
Respond ONLY JSON no backticks:
{"candidates":[{"rank":1,"score":92,"title_ko":"한국어 제목","source":"Source","category":"seo-techniques","angle_ko":"앵글 2-3문장","key_data_points":["p1","p2","p3"],"why_now":"왜 지금"}]}`;
    const r=await callClaude(sys,"Search latest SEO/UIUX/web articles, select 5 best candidates. JSON only.",true);
    const c=r.replace(/```json|```/g,"").trim();
    const s=c.indexOf("{"), e=c.lastIndexOf("}")+1;
    const p=JSON.parse(c.slice(s,e));
    state.candidates=p.candidates||[];
    state.step="candidates";
  }catch(e){state.error=e.message}
  state.loading=false; render();
}

// ─── Generate ───
async function doGenerate(topic){
  state.selected=topic; state.loading=true;
  state.loadMsg="그루브웹 톤으로 칼럼 작성 중...\n도입부 → 인용구 → 반전 → 본론 → 비교표 → 결론\n(1-3분 소요)";
  state.error=null; render();
  try{
    const ws=`You are a senior content writer for 그루브웹. Write a column in EXACTLY this structure:
1.[TITLE] 제목
2.[INTRO] 도입부-독자 오해짚기("많은 기업들은 ~를 문제로 삼습니다")
3.[QUOTE1][QUOTE2][QUOTE3] 흔한 오해 인용구 3줄
4.[TURN] 반전("하지만 실제로 ~를 뜯어보면")
5.[SECTION] 소제목 + [BODY] 본문 (3-4개)
6.[TABLE_START][TABLE_HEADER]구분|열1|열2 [TABLE_ROW]항목|내용1|내용2 [TABLE_END]
7.[CONCLUSION] 결론
8.[END]
톤:경어체(합니다/습니다),전문적이지만 쉽게,"~라는 점입니다"패턴,이모지 절대 금지,2000-3500자.
그루브웹 사례:"실제로 그루브웹에 ~를 요청했던 한 기업의 홈페이지를 보면"
하단 소개 블록 생성하지 마세요.`;
    const um=`주제:${topic.title_ko}\n앵글:${topic.angle_ko}\n카테고리:${topic.category}\n핵심:${JSON.stringify(topic.key_data_points)}\n\n위 주제로 칼럼 작성. web_search 활용 가능. 마커 형식 출력.`;
    let draft=await callClaude(ws,um,true);

    state.loadMsg="에디터 검수 중...";render();
    const es=`Review 그루브웹 column. Check:경어체,이모지없음,구조,2000-3500자,"~라는 점입니다"패턴.
Respond ONLY JSON:{"score":95,"summary":"결과","revised_draft":"수정 본문(수정없으면 원본)"}`;
    let sc=80;
    try{
      const er=await callClaude(es,`Draft:\n${draft}`);
      const ec=er.replace(/```json|```/g,"").trim();
      const ei=ec.indexOf("{"),ej=ec.lastIndexOf("}")+1;
      const ep=JSON.parse(ec.slice(ei,ej));
      if(ep.revised_draft) draft=ep.revised_draft;
      sc=ep.score||80;
    }catch(e){}

    const{html,title}=toHtml(draft,topic.category);
    state.html=html; state.title=title; state.score=sc;
    state.step="preview";
  }catch(e){state.error=e.message}
  state.loading=false; render();
}

// ─── Markers → HTML ───
function toHtml(raw,cat){
  const lines=raw.split("\n"),parts=[];let title="",inT=false,tH=[],tR=[];
  const ps=`style="text-align:justify;font-size:16px;letter-spacing:0px;line-height:1.8"`;
  const hs=`style="font-size:24px;letter-spacing:-1px;line-height:1.4"`;
  for(const rl of lines){
    const l=rl.trim();if(!l)continue;
    if(l.startsWith("[TABLE_START]")){inT=true;tH=[];tR=[];continue}
    if(l.startsWith("[TABLE_END]")){
      inT=false;
      let t=`<table style="width:100%;border-collapse:collapse;margin:20px 0"><tr>`;
      tH.forEach(h=>{t+=`<th style="background-color:rgb(204,204,204);padding:10px 12px;font-size:14px;font-weight:bold;text-align:center;border:1px solid #ddd">${h}</th>`});
      t+=`</tr>`;tR.forEach(r=>{t+=`<tr>`;r.forEach((c,i)=>{t+=`<td style="padding:10px 12px;font-size:14px;text-align:left;border:1px solid #ddd">${i===0?`<strong>${c}</strong>`:c}</td>`});t+=`</tr>`});
      t+=`</table>`;parts.push(t);continue}
    if(inT){if(l.startsWith("[TABLE_HEADER]"))tH=l.replace("[TABLE_HEADER]","").trim().split("|").map(s=>s.trim());
    else if(l.startsWith("[TABLE_ROW]"))tR.push(l.replace("[TABLE_ROW]","").trim().split("|").map(s=>s.trim()));continue}
    if(l.startsWith("[TITLE]")){title=l.replace("[TITLE]","").trim();continue}
    if(l.startsWith("[INTRO]"))parts.push(`<p ${ps}><strong style="font-size:16px">${l.replace("[INTRO]","").trim()}</strong></p>`);
    else if(l.match(/^\[QUOTE\d/)){const t=l.split("]").slice(1).join("]").trim();parts.push(`<p ${ps}>"${t}"</p>`)}
    else if(l.startsWith("[TURN]"))parts.push(`<p ${ps}>${l.replace("[TURN]","").trim()}</p>`);
    else if(l.startsWith("[SECTION]")){parts.push("<hr>");parts.push(`<p ${hs}><strong>${l.replace("[SECTION]","").trim()}</strong></p>`)}
    else if(l.startsWith("[BODY]"))parts.push(`<p ${ps}>${l.replace("[BODY]","").trim()}</p>`);
    else if(l.startsWith("[CONCLUSION]")){parts.push("<hr>");const ct=l.replace("[CONCLUSION]","").trim();
      const hp=ct.startsWith("결론");parts.push(`<p ${hs}><strong>${hp?"":"결론 : "}${title}</strong></p>`);
      const b=ct.replace(/^결론\s*[:：]\s*/,"").trim();if(b)parts.push(`<p ${ps}>${b}</p>`)}
    else if(l.startsWith("[END]"))break;
    else if(l.length>0&&!l.startsWith("["))parts.push(`<p ${ps}>${l}</p>`);
  }
  const img="https://cdn.imweb.me/upload/S20240529026030d67eeda/73eb2fe2bb412.jpg";
  return{html:`<p style="text-align:justify;letter-spacing:0px"><img src="${img}" style="width:100%"></p>\n${parts.join("\n")}\n${FOOTER}`,title};
}

// ─── Download ───
function download(type){
  const c=type==="preview"?`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${state.title}</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,"Malgun Gothic",sans-serif;background:#f5f5f5}.w{max-width:720px;margin:24px auto;padding:40px;background:#fff}img{max-width:100%;height:auto}table{margin:16px 0}hr{border:none;border-top:1px solid #e5e5e5;margin:28px 0}p{margin-bottom:16px}</style></head><body><div class="w">${state.html}</div></body></html>`:state.html;
  const b=new Blob([c],{type:"text/html;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");
  const d=new Date().toISOString().slice(0,10).replace(/-/g,"");
  a.href=u;a.download=type==="preview"?`${d}_preview.html`:`${d}_imweb.html`;a.click();URL.revokeObjectURL(u);
}

// ─── Approve ───
function approve(){
  state.history.unshift({title:state.title,category:state.selected?.category,date:new Date().toISOString()});
  saveHist();download("imweb");state.step="done";render();
}

// ─── Render ───
function render(){
  const $=document.getElementById("app");
  const dot=document.getElementById("dot");
  const badge=document.getElementById("status-badge");
  dot.className="dot"+(state.loading?" on":state.step==="done"?" done":"");
  badge.textContent=state.loading?"WORKING...":state.step.toUpperCase();
  let h="";

  // Error
  if(state.error) h+=`<div class="err">${state.error}<br><button onclick="state.error=null;render()" style="margin-top:8px;background:none;border:1px solid var(--rd);color:var(--rd);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">닫기</button></div>`;

  // Loading
  if(state.loading){
    h+=`<div class="loading"><div class="spinner"></div><div class="load-text">${state.loadMsg}</div></div>`;
    $.innerHTML=h;return;
  }

  // Setup
  if(state.step==="setup"){
    h+=`<div class="banner"><div class="icon">⚡</div><div class="title">GrooveBot</div><div class="sub">해외 SEO/UIUX 소스를 스캔하고 그루브웹 칼럼을 자동 생성합니다</div></div>`;
    h+=`<div style="margin-bottom:12px"><label style="font-size:12px;color:var(--dm);margin-bottom:6px;display:block">Anthropic API Key</label>`;
    h+=`<input class="inp" type="password" id="keyInput" value="${state.apiKey}" placeholder="sk-ant-api03-..." oninput="state.apiKey=this.value"></div>`;
    h+=`<button class="btn btn-p" ${state.apiKey.length<20?"disabled":""} onclick="saveKey(state.apiKey);doResearch()">리서치 시작</button>`;
    if(state.history.length){
      h+=`<div class="label">최근 발행 (${state.history.length}건)</div><div class="card">`;
      state.history.slice(0,5).forEach((x,i)=>{
        h+=`<div class="hist-item"><span class="hist-title">${x.title}</span><span class="hist-date">${(x.date||"").slice(0,10)}</span></div>`;
      });
      h+=`</div>`;
    }
  }

  // Candidates
  else if(state.step==="candidates"){
    h+=`<div class="label">칼럼 후보 ${state.candidates.length}개</div>`;
    state.candidates.forEach((c,i)=>{
      h+=`<div class="card"><div class="card-head"><span class="rank">#${c.rank||i+1}</span><span class="score">Score ${c.score||"—"}</span></div>`;
      h+=`<div class="card-body"><div class="card-title">${c.title_ko||""}</div>`;
      h+=`<div class="tags"><span class="tag cat">${CATS[c.category]||c.category}</span><span class="tag">${c.source||""}</span></div>`;
      h+=`<div class="angle">${c.angle_ko||""}</div></div>`;
      h+=`<button class="sel-btn" onclick="doGenerate(state.candidates[${i}])">이 주제로 칼럼 생성 →</button></div>`;
    });
    h+=`<button class="btn btn-g" onclick="doResearch()" style="margin-top:8px">다시 리서치</button>`;
  }

  // Preview
  else if(state.step==="preview"){
    h+=`<div class="label">칼럼 시안</div>`;
    h+=`<div class="card"><div class="card-body" style="padding-top:16px"><div class="card-title" style="font-size:17px">${state.title}</div>`;
    h+=`<div class="tags"><span class="tag cat">${CATS[state.selected?.category]||""}</span>`;
    h+=`<span class="sc-badge ${state.score>=85?"sc-hi":"sc-md"}">검수 ${state.score}점</span></div></div></div>`;
    h+=`<div class="preview-wrap">${state.html}</div>`;
    h+=`<div class="bottom"><div class="btn-grp"><button class="btn btn-d" onclick="state.step='candidates';state.html='';state.title='';render()">반려</button>`;
    h+=`<button class="btn btn-p" onclick="approve()">승인 · 다운로드</button></div>`;
    h+=`<button class="btn btn-g" onclick="download('preview')" style="margin-top:8px;padding:10px;font-size:12px">미리보기 HTML 다운로드</button></div>`;
  }

  // Done
  else if(state.step==="done"){
    h+=`<div class="banner ok"><div class="icon">✅</div><div class="title">발행 완료</div><div class="sub">아임웹 HTML 파일이 다운로드되었습니다</div></div>`;
    h+=`<div class="card"><div class="howto"><strong style="font-size:13px;color:var(--dm)">아임웹 적용법</strong><br><br>`;
    h+=`1. 다운로드된 HTML 파일을 메모장/텍스트에디터로 열기<br>`;
    h+=`2. 전체 내용 복사 (Ctrl+A → Ctrl+C)<br>`;
    h+=`3. 아임웹 → 글쓰기 → 에디터 상단 "소스" 버튼 클릭<br>`;
    h+=`4. 복사한 HTML 붙여넣기 → 저장</div></div>`;
    h+=`<div class="btn-grp" style="margin-top:12px"><button class="btn btn-g" onclick="download('imweb')">다시 다운로드</button>`;
    h+=`<button class="btn btn-p" onclick="state.step='setup';state.candidates=[];state.html='';state.title='';state.selected=null;render()">새 칼럼 시작</button></div>`;
  }

  $.innerHTML=h;
}

// ─── Init ───
state.apiKey=loadKey();
state.history=loadHist();
render();
</script>
</body>
</html>
