<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>GrooveBot</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--sf:#141414;--sf2:#1c1c1c;--sf3:#242424;--bd:#2a2a2a;--tx:#e8e8e8;--dm:#888;--mt:#555;--ac:#c8ff00;--acd:rgba(200,255,0,.12);--rd:#ff4444;--gn:#22c55e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh}
.hdr{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#555;transition:all .3s}
.dot.on{background:var(--ac);box-shadow:0 0 8px var(--ac);animation:pulse 2s ease-in-out infinite}
.dot.done{background:var(--gn);box-shadow:0 0 8px var(--gn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.hdr h1{font-size:15px;font-weight:700;letter-spacing:-.5px}
.hdr h1 em{color:var(--ac);font-style:normal}
.badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dm);background:var(--sf2);padding:4px 10px;border-radius:4px}
.main{padding:16px;max-width:480px;margin:0 auto;padding-bottom:120px}
.banner{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px}
.banner .icon{font-size:36px;margin-bottom:10px}
.banner .title{font-size:16px;font-weight:700;margin-bottom:4px}
.banner .sub{font-size:13px;color:var(--dm);line-height:1.6}
.banner.ok{border-color:var(--gn)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-head{padding:16px 16px 12px;display:flex;justify-content:space-between}
.rank{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--ac);background:var(--acd);padding:2px 8px;border-radius:4px}
.score{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dm)}
.card-body{padding:0 16px 16px}
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.45;margin-bottom:8px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--sf3);color:var(--dm)}
.tag.cat{background:var(--acd);color:var(--ac)}
.angle{font-size:13px;color:var(--dm);line-height:1.55}
.sel-btn{display:block;width:100%;padding:12px;background:var(--sf2);border:none;border-top:1px solid var(--bd);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.sel-btn:active{background:var(--ac);color:#000}
.btn{display:flex;align-items:center;justify-content:center;padding:14px 24px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;width:100%;min-height:48px}
.btn-p{background:var(--ac);color:#000}
.btn-p:active{transform:scale(.97)}
.btn-d{background:transparent;border:1px solid var(--rd);color:var(--rd)}
.btn-g{background:transparent;border:1px solid var(--bd);color:var(--dm)}
.btn-grp{display:flex;gap:8px}
.btn-grp .btn{flex:1}
.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--bd);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:50;max-width:480px;margin:0 auto}
.loading{display:flex;flex-direction:column;align-items:center;padding:40px 0;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.load-text{font-size:13px;color:var(--dm);text-align:center;line-height:1.8;white-space:pre-line}
.err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:12px 16px;margin:12px 0;font-size:13px;color:var(--rd)}
.label{font-size:11px;font-weight:600;color:var(--mt);letter-spacing:1px;margin:20px 0 10px}
.preview-wrap{background:#fff;border-radius:8px;overflow:hidden;margin:12px 0;max-height:55vh;overflow-y:auto;padding:20px}
.preview-wrap img{max-width:100%!important;height:auto!important}
.preview-wrap p{margin-bottom:16px;color:#333}
.preview-wrap hr{border:none;border-top:1px solid #e5e5e5;margin:28px 0}
.sc-badge{font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 10px;border-radius:6px}
.sc-hi{background:rgba(34,197,94,.15);color:var(--gn)}
.sc-md{background:rgba(59,130,246,.15);color:#3b82f6}
.howto{font-size:14px;color:var(--tx);line-height:1.8;padding:16px}
.hist-item{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.hist-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-brand"><div class="dot" id="dot"></div><h1>Groove<em>Bot</em></h1></div><div class="badge" id="statusBadge">IDLE</div></div>
<div class="main" id="app"></div>
<script>
const MODEL="claude-sonnet-4-20250514";
const CATS={"website-creation-tips":"홈페이지 제작 팁","seo-techniques":"SEO 테크닉","grooveweb-story":"그루브웹 이야기"};
const EXISTING="사이트 구조 설계,메타 태그,SEO 키워드리서치,SEO 최적화 검색 노출,자료 준비,제작 업체 선택,제작 기간,제작 비용,의뢰 질문,사내디자이너,디자인만 잘하는 업체,외주 전 7가지,기획 가능한 업체,기간 단축,포트폴리오 확인,아임웹 워드프레스,스타트업 홈페이지,반응형 제작사,리뉴얼 실패,모바일 무시,B2B 마케팅,부동산 홈페이지,화장품 제조업체,반응형 적응형,모바일 SEO,2025년 트렌드,SEO 의뢰 4가지,기획 꿀팁,홈페이지 블로그 비교,서드파티 쿠키,아임웹 장점,그로스해킹,백링크,테크니컬 SEO,롱테일 숏테일,온페이지 SEO,체크리스트,브랜드 스토리,리뉴얼 신호,블랙햇 화이트햇,컨텐츠 SEO,검색엔진 등록,구글 애널리틱스,웹 디자인 트렌드";
const FOOTER='<hr><p style="text-align:justify;letter-spacing:0px"><img src="https://cdn.imweb.me/upload/S20240529026030d67eeda/320e151158880.jpg" style="width:100%"><\/p><p style="text-align:justify;letter-spacing:0px"><strong style="font-size:16px">그루브웹은 10년 이상의 경험을 바탕으로, 고객 맞춤형 웹사이트를 설계하고 개발하는 전문 웹사이트 제작업체입니다.<\/strong> <span style="font-size:16px">디자이너 출신의 전문 팀이 직접 운영하며, 아임웹과 자체 코드를 활용한 효율적이고 직관적인 웹사이트 구축을 제공합니다.<\/span><\/p><p style="text-align:justify;letter-spacing:0px"><strong style="font-size:16px">수많은 성공적인 프로젝트를 통해 그루브웹은 고객의 고민을 100% 이해하고, 그 이상의 해결책을 제안하는 것을 목표로 하고 있습니다.<\/strong> <span style="font-size:16px">고객의 비즈니스 성장과 성공을 위해 항상 최선을 다하는 그루브웹은 각 분야에 맞는 맞춤형 솔루션을 제공합니다.<\/span><\/p><p style="text-align:justify;letter-spacing:0px"><span style="font-size:16px">웹사이트 제작에 대해 궁금한 점이 있으신가요? 아래 연락처로 문의해 주시면, 신속하게 상담을 진행해 드리겠습니다.<\/span><\/p><p style="text-align:center;letter-spacing:0px"><a href="https://www.groove-web.com/contact" target="_blank" style="font-size:16px;background-color:#000;color:#fff;padding:12px 32px;text-decoration:none;display:inline-block;margin:16px 0">가장 빠른 상담 요청하기 \u2192<\/a><\/p><p style="text-align:justify;letter-spacing:0px"><img src="https://cdn.imweb.me/upload/S20240529026030d67eeda/6889c8458b2c3.jpg" style="width:100%"><\/p>';

var S={step:"home",candidates:[],selected:null,html:"",title:"",score:0,history:[],error:null,loading:false,loadMsg:""};
try{S.history=JSON.parse(localStorage.getItem("gb-hist")||"[]")}catch(e){}

async function callAPI(sys,msg,search){
  var body={model:MODEL,max_tokens:8192,system:sys,messages:[{role:"user",content:msg}]};
  if(search)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  var r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  var d=await r.json();
  if(!r.ok)throw new Error(d&&d.error&&d.error.message||d&&d.error||"API Error "+r.status);
  return d.content.filter(function(b){return b.type==="text"}).map(function(b){return b.text}).join("\n").trim();
}

async function doResearch(){
  S.loading=true;S.loadMsg="해외 SEO/UIUX 소스 스캔 중...\nSearch Engine Journal, Moz, Ahrefs 등\n10개 이상 소스 분석 (1-2분)";S.error=null;render();
  try{
    var sys="You are a senior SEO/UIUX content researcher for 그루브웹. Search web for latest overseas SEO, UIUX, web dev articles (past 7-30 days). Sources: Search Engine Journal, Moz, Ahrefs, Semrush, Google Search Central, Smashing Magazine, NNGroup, Web.dev, X SEO community. Select 5 best for Korean column. NOT overlap: "+EXISTING+". Map to website-creation-tips/seo-techniques/grooveweb-story. For Korean SMB owners. 2000+ words possible. Respond ONLY JSON no backticks: {\"candidates\":[{\"rank\":1,\"score\":92,\"title_ko\":\"제목\",\"source\":\"Source\",\"category\":\"seo-techniques\",\"angle_ko\":\"앵글\",\"key_data_points\":[\"p1\",\"p2\"],\"why_now\":\"이유\"}]}";
    var r=await callAPI(sys,"Search latest SEO/UIUX articles, select 5 best candidates. JSON only.",true);
    var c=r.replace(/```json|```/g,"").trim();
    var p=JSON.parse(c.slice(c.indexOf("{"),c.lastIndexOf("}")+1));
    S.candidates=p.candidates||[];S.step="pick";
  }catch(e){S.error=e.message}
  S.loading=false;render();
}

async function doGenerate(idx){
  var topic=S.candidates[idx];S.selected=topic;S.loading=true;
  S.loadMsg="그루브웹 톤으로 칼럼 작성 중...\n도입부 → 인용구 3줄 → 반전 → 본론 → 비교표 → 결론\n(1-3분 소요)";S.error=null;render();
  try{
    var ws="You are a senior writer for 그루브웹. Write column in this exact marker structure:\n[TITLE] 제목\n[INTRO] 도입부\n[QUOTE1] 인용구1\n[QUOTE2] 인용구2\n[QUOTE3] 인용구3\n[TURN] 반전\n[SECTION] 소제목\n[BODY] 본문 (3-4 sections)\n[TABLE_START]\n[TABLE_HEADER] 구분|열1|열2\n[TABLE_ROW] 항목|내용1|내용2\n[TABLE_END]\n[CONCLUSION] 결론\n[END]\nRules: 경어체, 이모지 금지, 2000-3500자, ~라는 점입니다 패턴. 하단 소개 블록 생성 금지.";
    var draft=await callAPI(ws,"주제:"+topic.title_ko+"\n앵글:"+topic.angle_ko+"\n카테고리:"+topic.category+"\n핵심:"+JSON.stringify(topic.key_data_points)+"\n\n마커 형식으로 칼럼 작성. web_search 활용.",true);
    S.loadMsg="에디터 검수 중...";render();
    var sc=82;
    try{var er=await callAPI("Review 그루브웹 column. Check:경어체,이모지없음,구조,분량. Respond ONLY JSON no backticks:{\"score\":95,\"revised_draft\":\"수정본문\"}","Draft:\n"+draft,false);
      var ec=er.replace(/```json|```/g,"").trim();var ep=JSON.parse(ec.slice(ec.indexOf("{"),ec.lastIndexOf("}")+1));
      if(ep.revised_draft&&ep.revised_draft.length>500)draft=ep.revised_draft;sc=ep.score||82;
    }catch(e){}
    var res=toHtml(draft);S.html=res.html;S.title=res.title||topic.title_ko;S.score=sc;S.step="preview";
  }catch(e){S.error=e.message}
  S.loading=false;render();
}

function toHtml(raw){
  var lines=raw.split("\n"),parts=[],title="",inT=false,tH=[],tR=[];
  var ps='style="text-align:justify;font-size:16px;letter-spacing:0px;line-height:1.8"';
  var hs='style="font-size:24px;letter-spacing:-1px;line-height:1.4"';
  for(var i=0;i<lines.length;i++){var l=lines[i].trim();if(!l)continue;
    if(l.startsWith("[TABLE_START]")){inT=true;tH=[];tR=[];continue}
    if(l.startsWith("[TABLE_END]")){inT=false;var t='<table style="width:100%;border-collapse:collapse;margin:20px 0"><tr>';tH.forEach(function(h){t+='<th style="background-color:rgb(204,204,204);padding:10px 12px;font-size:14px;font-weight:bold;text-align:center;border:1px solid #ddd">'+h+'</th>'});t+='</tr>';tR.forEach(function(r){t+='<tr>';r.forEach(function(c,j){t+='<td style="padding:10px 12px;font-size:14px;text-align:left;border:1px solid #ddd">'+(j===0?'<strong>'+c+'</strong>':c)+'</td>'});t+='</tr>'});t+='</table>';parts.push(t);continue}
    if(inT){if(l.startsWith("[TABLE_HEADER]"))tH=l.replace("[TABLE_HEADER]","").trim().split("|").map(function(s){return s.trim()});else if(l.startsWith("[TABLE_ROW]"))tR.push(l.replace("[TABLE_ROW]","").trim().split("|").map(function(s){return s.trim()}));continue}
    if(l.startsWith("[TITLE]")){title=l.replace("[TITLE]","").trim();continue}
    if(l.startsWith("[INTRO]"))parts.push('<p '+ps+'><strong style="font-size:16px">'+l.replace("[INTRO]","").trim()+'</strong></p>');
    else if(l.match(/^\[QUOTE\d/)){var q=l.split("]").slice(1).join("]").trim();parts.push('<p '+ps+'>"'+q+'"</p>')}
    else if(l.startsWith("[TURN]"))parts.push('<p '+ps+'>'+l.replace("[TURN]","").trim()+'</p>');
    else if(l.startsWith("[SECTION]")){parts.push("<hr>");parts.push('<p '+hs+'><strong>'+l.replace("[SECTION]","").trim()+'</strong></p>')}
    else if(l.startsWith("[BODY]"))parts.push('<p '+ps+'>'+l.replace("[BODY]","").trim()+'</p>');
    else if(l.startsWith("[CONCLUSION]")){parts.push("<hr>");var ct=l.replace("[CONCLUSION]","").trim();parts.push('<p '+hs+'><strong>'+(ct.startsWith("결론")?"":"결론 : ")+title+'</strong></p>');var b=ct.replace(/^결론\s*[:：]\s*/,"").trim();if(b)parts.push('<p '+ps+'>'+b+'</p>')}
    else if(l.startsWith("[END]"))break;
    else if(l.length>0&&!l.startsWith("["))parts.push('<p '+ps+'>'+l+'</p>')}
  var img="https://cdn.imweb.me/upload/S20240529026030d67eeda/73eb2fe2bb412.jpg";
  return{html:'<p style="text-align:justify;letter-spacing:0px"><img src="'+img+'" style="width:100%"></p>\n'+parts.join("\n")+"\n"+FOOTER,title:title}
}

function dl(type){
  var d=new Date().toISOString().slice(0,10).replace(/-/g,"");
  var c=type==="imweb"?S.html:'<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>'+S.title+'</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#f5f5f5}.w{max-width:720px;margin:24px auto;padding:40px;background:#fff}img{max-width:100%;height:auto}hr{border:none;border-top:1px solid #e5e5e5;margin:28px 0}p{margin-bottom:16px}</style></head><body><div class="w">'+S.html+'</div></body></html>';
  var b=new Blob([c],{type:"text/html;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");
  a.href=u;a.download=type==="imweb"?d+"_grooveweb_imweb.html":d+"_grooveweb_preview.html";a.click();URL.revokeObjectURL(u)
}

function approve(){
  S.history.unshift({title:S.title,category:S.selected?S.selected.category:"",date:new Date().toISOString()});
  try{localStorage.setItem("gb-hist",JSON.stringify(S.history))}catch(e){}
  dl("imweb");S.step="done";render()
}

function render(){
  var $=document.getElementById("app"),dot=document.getElementById("dot"),badge=document.getElementById("statusBadge");
  dot.className="dot"+(S.loading?" on":S.step==="done"?" done":"");
  badge.textContent=S.loading?"WORKING...":S.step==="pick"?"CANDIDATES":S.step.toUpperCase();
  var h="";
  if(S.error)h+='<div class="err">'+S.error+'<br><button onclick="S.error=null;render()" style="margin-top:8px;background:none;border:1px solid var(--rd);color:var(--rd);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px">닫기</button></div>';
  if(S.loading){h+='<div class="loading"><div class="spinner"></div><div class="load-text">'+S.loadMsg+'</div></div>';$.innerHTML=h;return}

  if(S.step==="home"){
    h+='<div class="banner"><div class="icon">\u26A1</div><div class="title">GrooveBot</div><div class="sub">해외 SEO/UIUX 소스 스캔 \u2192<br>그루브웹 칼럼 자동 생성 \u2192 HTML 다운로드</div></div>';
    h+='<button class="btn btn-p" onclick="doResearch()">리서치 시작</button>';
    if(S.history.length){h+='<div class="label">최근 발행 ('+S.history.length+'건)</div><div class="card">';
      S.history.slice(0,5).forEach(function(x){h+='<div class="hist-item"><span style="font-size:13px;font-weight:500;flex:1;margin-right:12px">'+x.title+'</span><span style="font-size:11px;color:var(--mt);font-family:monospace">'+(x.date||"").slice(0,10)+'</span></div>'});h+='</div>'}
  }
  else if(S.step==="pick"){
    h+='<div class="label">칼럼 후보 '+S.candidates.length+'개</div>';
    S.candidates.forEach(function(c,i){
      h+='<div class="card"><div class="card-head"><span class="rank">#'+(c.rank||i+1)+'</span><span class="score">Score '+(c.score||"\u2014")+'</span></div>';
      h+='<div class="card-body"><div class="card-title">'+(c.title_ko||"")+'</div>';
      h+='<div class="tags"><span class="tag cat">'+(CATS[c.category]||c.category)+'</span><span class="tag">'+(c.source||"")+'</span></div>';
      h+='<div class="angle">'+(c.angle_ko||"")+'</div></div>';
      h+='<button class="sel-btn" onclick="doGenerate('+i+')">이 주제로 칼럼 생성 \u2192</button></div>'});
    h+='<button class="btn btn-g" onclick="doResearch()" style="margin-top:8px">다시 리서치</button>'
  }
  else if(S.step==="preview"){
    h+='<div class="label">칼럼 시안</div><div class="card"><div class="card-body" style="padding-top:16px"><div class="card-title" style="font-size:17px">'+S.title+'</div>';
    h+='<div class="tags"><span class="tag cat">'+(CATS[S.selected?S.selected.category:""]||"")+'</span>';
    h+='<span class="sc-badge '+(S.score>=85?"sc-hi":"sc-md")+'">검수 '+S.score+'점</span></div></div></div>';
    h+='<div class="preview-wrap">'+S.html+'</div>';
    h+='<div class="bottom"><div class="btn-grp"><button class="btn btn-d" onclick="S.step=\'pick\';S.html=\'\';S.title=\'\';render()">반려</button>';
    h+='<button class="btn btn-p" onclick="approve()">승인 \xB7 다운로드</button></div>';
    h+='<button class="btn btn-g" onclick="dl(\'preview\')" style="margin-top:8px;padding:10px;font-size:12px">미리보기 HTML 다운로드</button></div>'
  }
  else if(S.step==="done"){
    h+='<div class="banner ok"><div class="icon">\u2705</div><div class="title">발행 완료</div><div class="sub">아임웹 HTML이 다운로드되었습니다</div></div>';
    h+='<div class="card"><div class="howto"><strong style="font-size:13px;color:var(--dm)">아임웹 적용법</strong><br><br>1. 다운로드된 HTML 파일을 메모장으로 열기<br>2. 전체 선택 (Ctrl+A) \u2192 복사 (Ctrl+C)<br>3. 아임웹 \u2192 칼럼 글쓰기 \u2192 소스 버튼<br>4. 붙여넣기 \u2192 저장</div></div>';
    h+='<div class="btn-grp" style="margin-top:12px"><button class="btn btn-g" onclick="dl(\'imweb\')">다시 다운로드</button>';
    h+='<button class="btn btn-p" onclick="S.step=\'home\';S.candidates=[];S.html=\'\';S.title=\'\';S.selected=null;render()">새 칼럼 시작</button></div>'
  }
  $.innerHTML=h
}
render();
</script>
</body>
</html>
